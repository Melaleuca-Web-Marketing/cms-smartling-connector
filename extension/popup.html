<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>CMS Smartling Assistant</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <img src="smartling_logo.png" alt="" class="popup-logo">
        <div>
          <h1>Smartling</h1>
          <p>CMS product copy assistant</p>
        </div>
      </header>

      <section class="popup-card">
        <div class="section-title">
          <h2>Backend</h2>
          <span class="status-pill is-muted" id="backendState">Not tested</span>
        </div>
        <label for="apiBaseUrl">Backend URL</label>
        <input id="apiBaseUrl" type="url" spellcheck="false">
        <div class="actions">
          <button id="save" type="button">Save</button>
          <button id="test" type="button" class="secondary">Test backend</button>
        </div>
        <p class="small-note" id="backendDetails">Used by the in-page CMS panel.</p>
      </section>

      <section class="popup-card">
        <div class="section-title">
          <h2>Smartling Config</h2>
          <button id="checkSmartling" type="button" class="text-button">Check</button>
        </div>
        <div class="config-summary" id="smartlingSummary">
          <div class="empty-state">Run a config check to confirm project readiness.</div>
        </div>
      </section>

      <section class="popup-card">
        <div class="section-title">
          <h2>Panel State</h2>
        </div>
        <button id="resetPanel" type="button" class="secondary full-width">Reset panel state</button>
        <p class="small-note">Restores light theme, collapsed launcher, and collapsed Recent Requests.</p>
      </section>

      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
