# Redirect HTTP to HTTPS
server {
  listen 80;
  server_name usifhqtsagrqt01.melaleuca.net;
  return 301 https://$host$request_uri;
}

# HTTPS
server {
  listen 443 ssl http2;
  server_name usifhqtsagrqt01.melaleuca.net;

  ssl_certificate     /etc/nginx/ssl/usifhqtsagrqt01.pem;
  ssl_certificate_key /etc/nginx/ssl/usifhqtsagrqt01.key;
  # optional if your PEM doesn't already include the chain:
  # ssl_trusted_certificate /etc/nginx/ssl/usifhqtsagrqt01.pem;

  # Root app: newrequestform on :3000
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # Subpath app: skudatachecker on :3001
  location = /skudatachecker {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location ^~ /skudatachecker/_next/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  location ^~ /skudatachecker/api/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location ^~ /skudatachecker/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # Subpath app: content-qa-tester on :3002
  location = /content-qa {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location ^~ /content-qa/ {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # Subpath app: cms-smartling-connector docs and backend
  location = /cms-smartling {
    return 302 /cms-smartling/;
  }

  location = /cms-smartling/ {
    return 302 /cms-smartling/index.html;
  }

  location = /cms-smartling/index.html {
    alias /usr/share/nginx/cms-smartling-docs/index.html;
  }

  location = /cms-smartling/styles.css {
    alias /usr/share/nginx/cms-smartling-docs/styles.css;
  }

  location ^~ /cms-smartling/assets/ {
    alias /usr/share/nginx/cms-smartling-docs/assets/;
  }

  location ^~ /cms-smartling/downloads/ {
    alias /usr/share/nginx/cms-smartling-docs/downloads/;
  }

  location = /cms-smartling/health {
    proxy_pass http://127.0.0.1:17817/health;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location ^~ /cms-smartling/api/ {
    rewrite ^/cms-smartling(/.*)$ $1 break;
    proxy_pass http://127.0.0.1:17817;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }
}
